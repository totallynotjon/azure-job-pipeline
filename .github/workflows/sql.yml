name: SQL DACPAC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "plan (Script) or apply (Publish)"
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  SQL_SERVER: sql-jonsjobpipeline
  SQL_DATABASE: sqldb-jobpipeline
  SQL_RG: rg-azure-job-pipeline
  DACPAC_PATH: ./db/bin/Release/JobPipeline.dacpac

jobs:
  check-db-changes:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            db:
              - 'db/**'
              - '.github/workflows/sql.yml'

  decide-action:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
    steps:
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "action=plan" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "action=apply" >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: DACPAC Script (Plan)
    needs: [decide-action, check-db-changes]
    runs-on: ubuntu-latest
    if: needs.decide-action.outputs.action == 'plan' && needs.check-db-changes.outputs.db == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SqlPackage CLI
        run: dotnet tool install -g Microsoft.SqlPackage

      - name: Build DACPAC
        run: dotnet build db/JobPipeline.sqlproj -c Release

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Add runner IP to SQL firewall
        id: firewall
        run: |
          RUNNER_IP=$(curl -fsS --retry 3 --retry-delay 2 https://api.ipify.org)
          [[ "$RUNNER_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid IP from ipify: $RUNNER_IP"; exit 1; }
          RULE_NAME="gha-plan-${{ github.run_id }}-${{ github.run_attempt }}"
          az sql server firewall-rule create \
            --resource-group "$SQL_RG" \
            --server "$SQL_SERVER" \
            --name "$RULE_NAME" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP" \
            --output none
          echo "rule_name=$RULE_NAME" >> "$GITHUB_OUTPUT"

      - name: Generate deployment script
        run: |
          sqlpackage /Action:Script \
            /SourceFile:"$DACPAC_PATH" \
            /TargetConnectionString:"Server=${SQL_SERVER}.database.windows.net;Database=${SQL_DATABASE};Authentication=Active Directory Default;" \
            /OutputPath:"./deploy-script.sql"

      - name: Show deployment script
        run: |
          echo "::group::Deployment Script (T-SQL that would run on apply)"
          cat ./deploy-script.sql
          echo "::endgroup::"

      - name: Compose PR comment body
        if: github.event_name == 'pull_request'
        run: |
          {
            echo '## DACPAC Deploy Plan'
            echo ''
            echo 'T-SQL that would execute on apply to `sqldb-jobpipeline`:'
            echo ''
            echo '```sql'
            cat ./deploy-script.sql
            echo '```'
            echo ''
            echo "<sub>Commit \`${{ github.sha }}\` · [Run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>"
          } > ./pr-comment.md

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: dacpac-plan
          path: ./pr-comment.md

      - name: Remove runner IP from SQL firewall
        if: always() && steps.firewall.outputs.rule_name != ''
        run: |
          az sql server firewall-rule delete \
            --resource-group "$SQL_RG" \
            --server "$SQL_SERVER" \
            --name "${{ steps.firewall.outputs.rule_name }}" \
            --output none

  apply:
    name: DACPAC Publish (Apply)
    needs: [decide-action, check-db-changes]
    runs-on: ubuntu-latest
    if: needs.decide-action.outputs.action == 'apply' && needs.check-db-changes.outputs.db == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SqlPackage CLI
        run: dotnet tool install -g Microsoft.SqlPackage

      - name: Build DACPAC
        run: dotnet build db/JobPipeline.sqlproj -c Release

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Add runner IP to SQL firewall
        id: firewall
        run: |
          RUNNER_IP=$(curl -fsS --retry 3 --retry-delay 2 https://api.ipify.org)
          [[ "$RUNNER_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid IP from ipify: $RUNNER_IP"; exit 1; }
          RULE_NAME="gha-apply-${{ github.run_id }}-${{ github.run_attempt }}"
          az sql server firewall-rule create \
            --resource-group "$SQL_RG" \
            --server "$SQL_SERVER" \
            --name "$RULE_NAME" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP" \
            --output none
          echo "rule_name=$RULE_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish DACPAC
        run: |
          sqlpackage /Action:Publish \
            /SourceFile:"$DACPAC_PATH" \
            /TargetConnectionString:"Server=${SQL_SERVER}.database.windows.net;Database=${SQL_DATABASE};Authentication=Active Directory Default;"

      - name: Remove runner IP from SQL firewall
        if: always() && steps.firewall.outputs.rule_name != ''
        run: |
          az sql server firewall-rule delete \
            --resource-group "$SQL_RG" \
            --server "$SQL_SERVER" \
            --name "${{ steps.firewall.outputs.rule_name }}" \
            --output none

  sql-status:
    needs: [plan, apply]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.plan.result }}" == "failure" || "${{ needs.apply.result }}" == "failure" ]]; then
            exit 1
          fi
