name: Terraform Infra

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "plan or apply"
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/infra.yml'

  setup:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
    steps:
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then                                                          
            echo "action=plan" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then                                                                
            echo "action=apply" >> "$GITHUB_OUTPUT"                                                                         
          else                                                                                                            
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"                                                          
          fi

  plan:
    needs: [setup, changes]
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: needs.setup.outputs.action == 'plan' && needs.changes.outputs.infra == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: dflook/terraform-plan@v1
        with:
          path: infra

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [setup, changes]
    if: needs.setup.outputs.action == 'apply' && needs.changes.outputs.infra == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: dflook/terraform-apply@v1
        with:
          path: infra
          auto_approve: true

  terraform-status:
    needs: [plan, apply]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.plan.result }}" == "failure" || "${{ needs.apply.result }}" == "failure" ]]; then
            exit 1
          fi
